name: Python CI

on:
  push:
    branches: [main, develop, feature/*]
    paths: ["python/**", ".github/workflows/python_ci.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["python/**", ".github/workflows/python_ci.yml"]

env:
  REGISTRY: ghcr.io

jobs:
  build_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check

      - name: Run tests
        run: PYTHONPATH=. pytest tests/

  build_publish_image:
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/flaskapp

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: ./python
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_publish_image
    if: github.event_name == 'push'

    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - uses: azure/login@v2
          with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}

        - name: Set up Terraform
          uses: hashicorp/setup-terraform@v3
          with:
              terraform_version: 1.x

        - name: Terraform Init
          id: init
          run: terraform -chdir=python init

        - name: Create terraform.tfvars
          uses: 1arp/create-a-file-action@0.4.5
          with:
              path: "./python"
              file: "terraform.tfvars"
              isAbsolutePath: false
              content: |
                  az_subscription_id="${{ vars.AZ_SUBSCRIPTION_ID }}"
                  image_url="${{ needs.build_publish_image.outputs.image-url }}"
                  registry="${{ env.REGISTRY }}"
                  registry_username="${{ github.actor }}"
                  registry_password="${{ secrets.GITHUB_TOKEN }}"
                  registry_email=""

        - name: Terraform Plan
          id: plan
          run: terraform -chdir=python plan -var-file=terraform.tfvars -no-color -input=false -refresh=false

        - name: Terraform Apply
          id: apply
          # Only apply on push
          if: github.event_name == 'push'
          run: terraform -chdir=python apply -var-file=terraform.tfvars -auto-approve -input=false -refresh=false
