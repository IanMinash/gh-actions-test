name: JavaScript CI

on:
  push:
    branches:
      - main
      - develop
      - feature/*
    paths:
      - "javascript/**"
      - .github/workflows/javascript_ci.yml
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "javascript/**"
      - .github/workflows/javascript_ci.yml

jobs:
  build_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./javascript

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Run eslint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build TypeScript
        run: npm run build

      - name: List dist files
        run: ls dist/

      - name: Check my secret
        run: echo "$my_secret"
        env:
          my_secret: ${{ secrets.VM_PASSWORD }}
