name: JavaScript CI

on: 
    push:
        branches: 
            - main
            - develop
            - feature/*
    pull_request:
        branches: [main, develop]

jobs:
    build_test:
        runs-on: ubuntu-latest
        defaults: 
            run:
                working-directory: ./javascript

        steps: 
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                node-version: lts/*


            - name: Install dependencies
              run: npm install 

            - name: Run tests
              run: npm run test

            - name: Build TypeScript
              run: npm run build

            - name: List dist files
              run: ls dist/
