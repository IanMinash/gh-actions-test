name: Release

on:
  workflow_dispatch: 

jobs:
  release: 
    permissions:
        contents: write
        issues: write
        pull-requests: write     ##release can now write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*  

      - name: Install dependencies
        run: npm ci 

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
