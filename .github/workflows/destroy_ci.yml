name: Terraform Destroy Resources CI

on: workflow_dispatch

env:
    REGISTRY: ghcr.io

jobs:
    destroy_job:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: 1.x

            - name: Terraform Init
              id: init
              run: terraform -chdir=python init

            - name: Create terraform.tfvars
              uses: 1arp/create-a-file-action@0.4.5
              with:
                  path: "./python"
                  file: "terraform.tfvars"
                  isAbsolutePath: false
                  content: |
                      az_subscription_id="${{ vars.AZ_SUBSCRIPTION_ID }}"
                      image_url=""
                      registry="${{ env.REGISTRY }}"
                      registry_username="${{ github.actor }}"
                      registry_password="${{ secrets.GITHUB_TOKEN }}"
                      registry_email=""

            - name: Terraform Destroy
              run: terraform -chdir=python destroy -var-file=terraform.tfvars -auto-approve -input=false -refresh=false
