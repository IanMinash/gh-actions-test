name: Python CI + Docker

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Alternatively: Log in to GHCR
      # - name: Log in to GitHub Container Registry
      #   if: github.event_name == 'push'
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ secrets.GHCR_USERNAME }}
      #     password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./python
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/myflaskapp:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/myflaskapp:${{ github.sha }}

          # for GHCR:
          # tags: |
          #   ghcr.io/${{ secrets.GHCR_USERNAME }}/myflaskapp:latest
          #   ghcr.io/${{ secrets.GHCR_USERNAME }}/myflaskapp:${{ github.sha }}
