version: '3.9'

services:
  redis:
    image: redis:latest
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - appnet      

  db: 
    image: postgres:16
    environment:
      - POSTGRES_DB=flaskhit
      - POSTGRES_USER=flaskapi
      - POSTGRES_PASSWORD=fastpass
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - appnet    

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_DB=flaskhit
      - POSTGRES_USER=flaskapi
      - POSTGRES_PASSWORD=fastpass
    depends_on:
      - db
      - redis
    networks:
      - appnet

networks:
  appnet:

volumes:
  redis-data:
  pg-data:
