services:
  redis:
    image: redis:latest
    ports:
      - 6379:6379
    volumes:
      - ./redis-data:/data
    networks:
      - appnet      
  db: 
    image: postgres:16
    environment:
      - POSTGRES_DB=flaskhit
      - POSTGRES_USER=flaskapi
      - POSTGRES_PASSWORD=fastpass

    networks:
      - appnet    
  
    volumes:
      - ./pg_data:var/lib/postgresql/data
  api:
    build: .
    ports:
      - 5000:5000
    environment:
      - REDIS_HOST=redis
      - POSTGRES_DB=flaskhit
      - POSTGRES_USER=flaskapi
      - POSTGRES_PASSWORD=fastpass

networks:
  appnet:  
volumes:
  redis-data: